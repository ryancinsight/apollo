[advisories]
ignore = [
    # WGPU 26 selects metal 0.32, whose archived paste dependency has no safe
    # upgrade. Apollo advances when the Hephaestus-owned WGPU ABI advances.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
