name: Legacy Migration Audit

# Apollo's existing xtask exposes the `provider-audit` subcommand as its native
# legacy-migration gate; this file is the ecosystem-uniform filename so the
# Atlas SSOT is searchable per-repo as `.github/workflows/legacy-migration-audit.yml`.
#
# The subcommand differs from cfdrs/kwavers/ritk/helios (those use the literal
# `legacy-migration-audit` subcommand added by their xtask scaffolding); this
# workflow invokes `provider-audit` because that's Apollo's actual gate
# semantics — forbidden ndarray references cause `bail!` (non-zero exit),
# clean exit otherwise. The allowlist-style mutation workflow is owned by
# Apollo's existing xtask architecture and is not duplicated here.

on:
  push:
    branches: [main, "refactor/**", "codex/**"]
  pull_request:branches: [main, "refactor/**", "codex/**"]

# Apollo's `provider-audit` subcommand hard-fails on forbidden ndarray references
# anywhere in the workspace manifest + source tree. The active
# `refactor/apollo-fft-eunomia` branch carries ~234 dirty files mid-migration,
# so the gate fires only on `main` + `codex/**` for now to keep the day-1
# green-banner promise; once that migration lands, expand to `refactor/**`.
branches: [main, "codex/**"] permissions:
  contents: read

concurrency:
  group: legacy-migration-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-legacy-migration:
    name: legacy-migration audit (Apollo: provider-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
          key: cargo-ubuntu-latest-stable-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-ubuntu-latest-stable-

      - name: Run xtask provider-audit (Apollo's legacy-migration gate)
        run: cargo run -p xtask -- provider-audit

      - name: Upload audit log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apollo-legacy-migration-audit-log
          path: |
            target/xtask-*.log
          if-no-files-found: ignore
