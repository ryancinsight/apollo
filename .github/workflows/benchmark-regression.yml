name: benchmark regression

on:
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml
      - .cargo/**
      - crates/apollo-bench/**
      - crates/apollo-fft/**
      - crates/apollo-fft-macros/**
      - crates/apollo-leto-interop/**
      - .github/workflows/benchmark-regression.yml
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: Git revision used as the performance baseline
        required: true
        default: main
        type: string
      candidate_ref:
        description: Git revision compared with the baseline
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: benchmark-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-regression:
    name: benchmark regression check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Checkout baseline
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.baseline_ref }}
          path: apollo-baseline

      - name: Checkout candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.ref || inputs.candidate_ref }}
          path: apollo-candidate

      # The benchmark harness is the measurement instrument. When a pull
      # request changes apollo-bench itself, compiling each revision against
      # its own harness changes both the instrument and the code under test.
      # Hold the candidate instrument constant across both revisions while
      # leaving the baseline transform implementation unchanged.
      - name: Pin candidate benchmark instrument
        shell: bash
        run: |
          set -euo pipefail
          git -C apollo-candidate archive HEAD crates/apollo-bench \
            | tar -x -C apollo-baseline
          for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
            diff --unified \
              "apollo-baseline/crates/apollo-fft/benches/$benchmark.rs" \
              "apollo-candidate/crates/apollo-fft/benches/$benchmark.rs"
          done

      - uses: dtolnay/rust-toolchain@1.97.0

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-apollo-bench-${{ hashFiles('apollo-candidate/Cargo.lock') }}

      - name: Measure counterbalanced revisions
        shell: bash
        run: |
          set -euo pipefail
          measure() {
            local source_directory="$1"
            local report_directory="$2"
            mkdir -p "$report_directory"
            echo "measuring $source_directory -> $report_directory" >&2
            for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
              cargo bench \
                --manifest-path "$source_directory/Cargo.toml" \
                --locked \
                -p apollo-fft \
                --bench "$benchmark" \
                --features kernel-strategy-bench \
                --quiet \
                > "$report_directory/$benchmark.csv"
            done
          }

          # ABBA followed by its phase reversal BAAB assigns each revision to
          # period positions with equal sums and equal squared sums. Agreement
          # across both blocks guards against a slowdown confined to one phase.
          measure apollo-baseline reports/first/baseline-first/baseline
          measure apollo-candidate reports/first/baseline-first/candidate
          measure apollo-candidate reports/first/candidate-first/candidate
          measure apollo-baseline reports/first/candidate-first/baseline
          measure apollo-candidate reports/second/candidate-first/candidate
          measure apollo-baseline reports/second/candidate-first/baseline
          measure apollo-baseline reports/second/baseline-first/baseline
          measure apollo-candidate reports/second/baseline-first/candidate

      - name: Compare reports
        run: >-
          cargo run
          --manifest-path apollo-candidate/Cargo.toml
          --locked
          -p apollo-bench
          --bin apollo-bench-compare
          --
          compare-replicated-counterbalanced
          --first-baseline-first-baseline-directory reports/first/baseline-first/baseline
          --first-baseline-first-candidate-directory reports/first/baseline-first/candidate
          --first-candidate-first-baseline-directory reports/first/candidate-first/baseline
          --first-candidate-first-candidate-directory reports/first/candidate-first/candidate
          --second-baseline-first-baseline-directory reports/second/baseline-first/baseline
          --second-baseline-first-candidate-directory reports/second/baseline-first/candidate
          --second-candidate-first-baseline-directory reports/second/candidate-first/baseline
          --second-candidate-first-candidate-directory reports/second/candidate-first/candidate
