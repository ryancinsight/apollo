name: benchmark regression

on:
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml
      - .cargo/**
      - crates/apollo-bench/**
      - crates/apollo-fft/**
      - crates/apollo-fft-macros/**
      - crates/apollo-leto-interop/**
      - .github/workflows/benchmark-regression.yml
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: Git revision used as the performance baseline
        required: true
        default: main
        type: string
      candidate_ref:
        description: Git revision compared with the baseline
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: benchmark-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-regression:
    name: benchmark regression check
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Checkout baseline
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.baseline_ref }}
          path: apollo-measurement

      - name: Checkout candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.ref || inputs.candidate_ref }}
          path: apollo-candidate-source

      # Hold the candidate instrument and representative workloads constant
      # across both revisions while leaving baseline production code unchanged.
      - name: Pin candidate benchmark instrument
        shell: bash
        run: |
          set -euo pipefail
          git -C apollo-candidate-source archive HEAD \
            crates/apollo-bench crates/apollo-fft/benches \
            | tar -x -C apollo-measurement
          for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
            diff --unified \
              "apollo-measurement/crates/apollo-fft/benches/$benchmark.rs" \
              "apollo-candidate-source/crates/apollo-fft/benches/$benchmark.rs"
          done

      - uses: dtolnay/rust-toolchain@1.97.0

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-apollo-bench-${{ hashFiles('apollo-candidate-source/Cargo.lock') }}

      # Both revisions compile at the same absolute path. This removes source
      # path and code-layout variation from the measurement boundary. Each
      # executable is preserved before the second revision occupies that path.
      - name: Compile fixed benchmark executables
        shell: bash
        run: |
          set -euo pipefail
          compile() {
            local revision="$1"
            local destination="benchmark-executables/$revision"
            local messages="benchmark-executables/$revision.json"
            mkdir -p "$destination"

            cargo bench \
              --manifest-path apollo-measurement/Cargo.toml \
              --locked \
              -p apollo-fft \
              --features kernel-strategy-bench \
              --no-run \
              --message-format=json \
              > "$messages"

            for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
              executable="$(
                jq -r \
                  --arg benchmark "$benchmark" \
                  'select(.reason == "compiler-artifact" and .target.name == $benchmark) | .executable // empty' \
                  "$messages" \
                  | tail -n 1
              )"
              test -n "$executable"
              install -m 755 "$executable" "$destination/$benchmark"
            done
          }

          compile baseline
          mv apollo-measurement apollo-baseline-source
          mv apollo-candidate-source apollo-measurement
          compile candidate

          for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
            sha256sum \
              "benchmark-executables/baseline/$benchmark" \
              "benchmark-executables/candidate/$benchmark"
          done

      - name: Smoke benchmark executables
        shell: bash
        env:
          APOLLO_BENCH_MODE: smoke
        run: |
          set -euo pipefail
          for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
            timeout 60s "benchmark-executables/candidate/$benchmark" > /dev/null
          done

      - name: Measure counterbalanced revisions
        shell: bash
        run: |
          set -euo pipefail
          measure() {
            local revision="$1"
            local report_directory="$2"
            mkdir -p "$report_directory"
            echo "measuring $revision -> $report_directory" >&2
            for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
              timeout 300s "benchmark-executables/$revision/$benchmark" \
                > "$report_directory/$benchmark.csv"
            done
          }

          # ABBA followed by its phase reversal BAAB assigns each revision to
          # period positions with equal sums and equal squared sums. Agreement
          # across both blocks guards against a slowdown confined to one phase.
          measure baseline reports/first/baseline-first/baseline
          measure candidate reports/first/baseline-first/candidate
          measure candidate reports/first/candidate-first/candidate
          measure baseline reports/first/candidate-first/baseline
          measure candidate reports/second/candidate-first/candidate
          measure baseline reports/second/candidate-first/baseline
          measure baseline reports/second/baseline-first/baseline
          measure candidate reports/second/baseline-first/candidate

      - name: Compare reports
        run: >-
          cargo run
          --manifest-path apollo-measurement/Cargo.toml
          --locked
          -p apollo-bench
          --bin apollo-bench-compare
          --
          compare-replicated-counterbalanced
          --first-baseline-first-baseline-directory reports/first/baseline-first/baseline
          --first-baseline-first-candidate-directory reports/first/baseline-first/candidate
          --first-candidate-first-baseline-directory reports/first/candidate-first/baseline
          --first-candidate-first-candidate-directory reports/first/candidate-first/candidate
          --second-baseline-first-baseline-directory reports/second/baseline-first/baseline
          --second-baseline-first-candidate-directory reports/second/baseline-first/candidate
          --second-candidate-first-baseline-directory reports/second/candidate-first/baseline
          --second-candidate-first-candidate-directory reports/second/candidate-first/candidate
