name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apollo
    steps:
      - uses: actions/checkout@v6
        with:
          path: apollo
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      # `hephaestus-cuda` uses NVIDIA's generated CUDA bindings, which require
      # the driver, runtime/compiler, and cuRAND headers from CUDA 13.2+ even
      # when no device is present. Install only that header closure: the full
      # toolkit exhausts the hosted runner without adding coverage to this
      # compile and test gate.
      - name: Install CUDA toolkit
        run: |
          wget --no-verbose -O /tmp/cuda-keyring.deb \
            https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            cuda-cudart-dev-13-3 cuda-driver-dev-13-3 cuda-nvcc-13-3 \
            libcurand-dev-13-3
          test -f /usr/local/cuda-13.3/include/cuda.h
          cuda_stub="$(find /usr/local/cuda-13.3 -path '*/stubs/libcuda.so' -print -quit)"
          test -n "$cuda_stub"
          cuda_lib_path="$(dirname "$cuda_stub")"
          cuda_runtime_path="$RUNNER_TEMP/cuda-driver-stubs"
          mkdir -p "$cuda_runtime_path"
          ln -sf "$cuda_stub" "$cuda_runtime_path/libcuda.so.1"
          {
            echo "CUDA_TOOLKIT_PATH=/usr/local/cuda-13.3"
            echo "CUDA_LIB_PATH=$cuda_lib_path"
            echo "LD_LIBRARY_PATH=$cuda_runtime_path${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.140,cargo-audit@0.22.2,cargo-deny@0.20.2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
          cache-targets: false
      # `cargo fmt --all` treats every path-sourced package reachable in the
      # resolved graph as "local" and formats it — including the fleet
      # siblings pulled in only via the [patch] table above. Scope to
      # apollo's own workspace members (cargo metadata --no-deps correctly
      # excludes patched externals) so CI never lints/formats another repo's
      # source.
      - name: Format
        run: |
          cargo metadata --locked --no-deps --format-version=1 \
            | jq -r '.packages[].name' \
            | while read -r package; do cargo fmt -p "$package" -- --check; done
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      # apollo-python builds pyo3 with the "extension-module" feature, which
      # deliberately omits linking against libpython (Python dynamically
      # loads the .so and supplies those symbols at runtime). A `cargo test`
      # binary is a normal executable that needs those symbols itself, so it
      # cannot link — apollo-python is exercised by the separate "python
      # bindings" job instead (maturin develop + pytest).
      #
      - name: Tests
        run: cargo nextest run --locked --workspace --all-features --exclude apollo-python --no-fail-fast
      - name: Doctests
        run: cargo test --locked --doc --workspace --exclude apollo-python
      - name: Documentation
        run: cargo doc --locked --workspace --exclude apollo-python --no-deps
      - name: Provider audit
        run: cargo run --locked -p xtask -- provider-audit
      - name: RustSec audit
        run: cargo audit --deny warnings
      - name: Dependency policy
        run: cargo deny check

  python:
    name: python bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apollo
    steps:
      - uses: actions/checkout@v6
        with:
          path: apollo
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
          cache-targets: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      # maturin develop requires an active virtualenv (or conda env) to
      # install into — there is none by default on the hosted runner.
      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Install Python test tools
        run: >-
          python -m pip install --upgrade
          pip==26.1.2 maturin==1.14.1 pytest==9.1.1 numpy==2.5.1
      - name: Build Python extension
        working-directory: apollo/crates/apollo-python
        run: maturin develop
      - name: Python smoke tests
        run: pytest crates/apollo-python/tests/test_smoke.py -q
