name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apollo
    steps:
      # apollo's [patch] table (Cargo.toml) resolves the Atlas fleet's git
      # dependencies to local-path siblings for cross-repo dev; CI must
      # recreate that same sibling layout so those patches resolve
      # identically to a local dev tree. actions/checkout refuses paths
      # outside $GITHUB_WORKSPACE, so apollo itself checks out into a
      # named subdirectory alongside each fleet sibling, all directly
      # under $GITHUB_WORKSPACE (the true common parent).
      - uses: actions/checkout@v4
        with:
          path: apollo
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/hephaestus
          ref: ks5-cholesky-panel
          path: hephaestus
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/leto
          ref: d9e8ac95949b8a684b26d739eb175874764f3e0e
          path: leto
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/eunomia
          path: eunomia
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/Mnemosyne
          ref: a6cbccf207c271af640c126ff27435f995c7cb6c
          path: mnemosyne
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/Moirai
          ref: 37ff12d584e1fb472f41b4e40c702d708aba1dac
          path: moirai
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/hermes
          ref: df67249ef05de8e1addc5a26d6831c70d63c3d18
          path: hermes
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/melinoe
          ref: ba9194613169827a6db55e7458b8e0320cd515e1
          path: melinoe
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-targets

  python:
    name: python bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apollo
    steps:
      - uses: actions/checkout@v4
        with:
          path: apollo
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/hephaestus
          ref: ks5-cholesky-panel
          path: hephaestus
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/leto
          ref: d9e8ac95949b8a684b26d739eb175874764f3e0e
          path: leto
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/eunomia
          path: eunomia
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/Mnemosyne
          ref: a6cbccf207c271af640c126ff27435f995c7cb6c
          path: mnemosyne
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/Moirai
          ref: 37ff12d584e1fb472f41b4e40c702d708aba1dac
          path: moirai
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/hermes
          ref: df67249ef05de8e1addc5a26d6831c70d63c3d18
          path: hermes
      - uses: actions/checkout@v4
        with:
          repository: ryancinsight/melinoe
          ref: ba9194613169827a6db55e7458b8e0320cd515e1
          path: melinoe
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python test tools
        run: python -m pip install --upgrade pip maturin pytest numpy
      - name: Build Python extension
        working-directory: apollo/crates/apollo-python
        run: maturin develop
      - name: Python smoke tests
        run: pytest crates/apollo-python/tests/test_smoke.py -q
