name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apollo
    steps:
      # apollo's [patch] table (Cargo.toml) resolves the Atlas fleet's git
      # dependencies to local-path siblings for cross-repo dev; CI must
      # recreate that same sibling layout so those patches resolve
      # identically to a local dev tree. actions/checkout refuses paths
      # outside $GITHUB_WORKSPACE, so apollo itself checks out into a
      # named subdirectory alongside each fleet sibling, all directly
      # under $GITHUB_WORKSPACE (the true common parent).
      - uses: actions/checkout@v6
        with:
          path: apollo
      - uses: ./apollo/.github/actions/checkout-atlas
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      # `hephaestus-cuda` uses NVIDIA's generated CUDA bindings, which require
      # the driver, runtime/compiler, and cuRAND headers from CUDA 13.2+ even
      # when no device is present. Install only that header closure: the full
      # toolkit exhausts the hosted runner without adding coverage to this
      # compile and test gate.
      - name: Install CUDA toolkit
        run: |
          wget --no-verbose -O /tmp/cuda-keyring.deb \
            https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            cuda-cudart-dev-13-3 cuda-driver-dev-13-3 cuda-nvcc-13-3 \
            libcurand-dev-13-3
          test -f /usr/local/cuda-13.3/include/cuda.h
          cuda_stub="$(find /usr/local/cuda-13.3 -path '*/stubs/libcuda.so' -print -quit)"
          test -n "$cuda_stub"
          cuda_lib_path="$(dirname "$cuda_stub")"
          cuda_runtime_path="$RUNNER_TEMP/cuda-driver-stubs"
          mkdir -p "$cuda_runtime_path"
          ln -sf "$cuda_stub" "$cuda_runtime_path/libcuda.so.1"
          {
            echo "CUDA_TOOLKIT_PATH=/usr/local/cuda-13.3"
            echo "CUDA_LIB_PATH=$cuda_lib_path"
            echo "LD_LIBRARY_PATH=$cuda_runtime_path${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.140,cargo-audit@0.22.2,cargo-deny@0.20.2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
          cache-targets: false
      # `cargo fmt --all` treats every path-sourced package reachable in the
      # resolved graph as "local" and formats it — including the fleet
      # siblings pulled in only via the [patch] table above. Scope to
      # apollo's own workspace members (cargo metadata --no-deps correctly
      # excludes patched externals) so CI never lints/formats another repo's
      # source.
      - name: Format
        run: |
          cargo metadata --locked --no-deps --format-version=1 \
            | jq -r '.packages[].name' \
            | while read -r package; do cargo fmt -p "$package" -- --check; done
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      # apollo-python builds pyo3 with the "extension-module" feature, which
      # deliberately omits linking against libpython (Python dynamically
      # loads the .so and supplies those symbols at runtime). A `cargo test`
      # binary is a normal executable that needs those symbols itself, so it
      # cannot link — apollo-python is exercised by the separate "python
      # bindings" job instead (maturin develop + pytest).
      #
      # RUST_MIN_STACK: apollo-fft's forced-Bluestein const-generic dispatch
      # (crates/apollo-fft/.../rader/bluestein.rs, exercised by
      # bluestein_matches_direct_for_n17/bluestein_roundtrip_n17) is a
      # deep, heap-scratch-backed (thread_local, not stack arrays — see
      # mixed_radix/caches/scratch.rs) but monomorphization-heavy call
      # chain. It passes deterministically and computes the correct value
      # (err < 1e-8) locally on Windows at the libtest default 2MiB test-
      # thread stack; Linux's larger per-frame ABI cost in unoptimized
      # debug builds pushes the identical, bounded call chain past that
      # default. Raise the budget rather than alter the algorithm.
      - name: Tests
        env:
          RUST_MIN_STACK: "16777216"
        run: cargo nextest run --locked --workspace --all-features --exclude apollo-python --no-fail-fast
      - name: Doctests
        run: cargo test --locked --doc --workspace --exclude apollo-python
      - name: Documentation
        run: cargo doc --locked --workspace --exclude apollo-python --no-deps
      - name: Provider audit
        run: cargo run --locked -p xtask -- provider-audit
      - name: RustSec audit
        run: cargo audit --deny warnings
      - name: Dependency policy
        run: cargo deny check

  benchmark-regression:
    name: benchmark regression check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Checkout baseline
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: apollo-baseline

      - name: Checkout candidate
        uses: actions/checkout@v6
        with:
          path: apollo-candidate

      # The benchmark harness is the measurement instrument. When a pull
      # request changes apollo-bench itself, compiling each revision against
      # its own harness changes both the instrument and the code under test.
      # Hold the candidate instrument constant across both revisions while
      # leaving the baseline transform implementation unchanged.
      - name: Pin candidate benchmark instrument
        shell: bash
        run: |
          set -euo pipefail
          git -C apollo-candidate archive HEAD crates/apollo-bench \
            | tar -x -C apollo-baseline
          for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
            diff --unified \
              "apollo-baseline/crates/apollo-fft/benches/$benchmark.rs" \
              "apollo-candidate/crates/apollo-fft/benches/$benchmark.rs"
          done

      - name: Checkout Atlas providers
        uses: ./apollo-candidate/.github/actions/checkout-atlas

      - uses: dtolnay/rust-toolchain@1.97.0

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-apollo-bench-${{ hashFiles('apollo-candidate/Cargo.lock') }}

      - name: Measure counterbalanced revisions
        shell: bash
        run: |
          set -euo pipefail
          measure() {
            local source_directory="$1"
            local report_directory="$2"
            mkdir -p "$report_directory"
            echo "measuring $source_directory -> $report_directory" >&2
            for benchmark in kernel_strategy prime_compose half_cyclic_rader; do
              cargo bench \
                --manifest-path "$source_directory/Cargo.toml" \
                --locked \
                -p apollo-fft \
                --bench "$benchmark" \
                --features kernel-strategy-bench \
                --quiet \
                > "$report_directory/$benchmark.csv"
            done
          }

          measure apollo-baseline reports/baseline-first/baseline
          measure apollo-candidate reports/baseline-first/candidate
          measure apollo-candidate reports/candidate-first/candidate
          measure apollo-baseline reports/candidate-first/baseline

      - name: Compare reports
        run: >-
          cargo run
          --manifest-path apollo-candidate/Cargo.toml
          --locked
          -p apollo-bench
          --bin apollo-bench-compare
          --
          compare-counterbalanced
          --baseline-first-baseline-directory reports/baseline-first/baseline
          --baseline-first-candidate-directory reports/baseline-first/candidate
          --candidate-first-baseline-directory reports/candidate-first/baseline
          --candidate-first-candidate-directory reports/candidate-first/candidate

  python:
    name: python bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apollo
    steps:
      - uses: actions/checkout@v6
        with:
          path: apollo
      - uses: ./apollo/.github/actions/checkout-atlas
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
          cache-targets: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      # maturin develop requires an active virtualenv (or conda env) to
      # install into — there is none by default on the hosted runner.
      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Install Python test tools
        run: >-
          python -m pip install --upgrade
          pip==26.1.2 maturin==1.14.1 pytest==9.1.1 numpy==2.5.1
      - name: Build Python extension
        working-directory: apollo/crates/apollo-python
        run: maturin develop
      - name: Python smoke tests
        run: pytest crates/apollo-python/tests/test_smoke.py -q
