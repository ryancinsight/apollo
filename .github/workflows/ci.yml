name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apollo
    steps:
      # apollo's [patch] table (Cargo.toml) resolves the Atlas fleet's git
      # dependencies to local-path siblings for cross-repo dev; CI must
      # recreate that same sibling layout so those patches resolve
      # identically to a local dev tree. actions/checkout refuses paths
      # outside $GITHUB_WORKSPACE, so apollo itself checks out into a
      # named subdirectory alongside each fleet sibling, all directly
      # under $GITHUB_WORKSPACE (the true common parent).
      - uses: actions/checkout@v6
        with:
          path: apollo
      - uses: ./apollo/.github/actions/checkout-atlas
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.140,cargo-audit@0.22.2,cargo-deny@0.20.2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
      # `cargo fmt --all` treats every path-sourced package reachable in the
      # resolved graph as "local" and formats it — including the fleet
      # siblings pulled in only via the [patch] table above. Scope to
      # apollo's own workspace members (cargo metadata --no-deps correctly
      # excludes patched externals) so CI never lints/formats another repo's
      # source.
      - name: Format
        run: |
          cargo metadata --locked --no-deps --format-version=1 \
            | jq -r '.packages[].name' \
            | while read -r package; do cargo fmt -p "$package" -- --check; done
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      # apollo-python builds pyo3 with the "extension-module" feature, which
      # deliberately omits linking against libpython (Python dynamically
      # loads the .so and supplies those symbols at runtime). A `cargo test`
      # binary is a normal executable that needs those symbols itself, so it
      # cannot link — apollo-python is exercised by the separate "python
      # bindings" job instead (maturin develop + pytest).
      #
      # RUST_MIN_STACK: apollo-fft's forced-Bluestein const-generic dispatch
      # (crates/apollo-fft/.../rader/bluestein.rs, exercised by
      # bluestein_matches_direct_for_n17/bluestein_roundtrip_n17) is a
      # deep, heap-scratch-backed (thread_local, not stack arrays — see
      # mixed_radix/caches/scratch.rs) but monomorphization-heavy call
      # chain. It passes deterministically and computes the correct value
      # (err < 1e-8) locally on Windows at the libtest default 2MiB test-
      # thread stack; Linux's larger per-frame ABI cost in unoptimized
      # debug builds pushes the identical, bounded call chain past that
      # default. Raise the budget rather than alter the algorithm.
      - name: Tests
        env:
          RUST_MIN_STACK: "16777216"
        run: cargo nextest run --locked --workspace --all-features --exclude apollo-python --no-fail-fast
      - name: Doctests
        run: cargo test --locked --doc --workspace --exclude apollo-python
      - name: Documentation
        run: cargo doc --locked --workspace --exclude apollo-python --no-deps
      - name: Provider audit
        run: cargo run --locked -p xtask -- provider-audit
      - name: RustSec audit
        run: cargo audit --deny warnings
      - name: Dependency policy
        run: cargo deny check

  python:
    name: python bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apollo
    steps:
      - uses: actions/checkout@v6
        with:
          path: apollo
      - uses: ./apollo/.github/actions/checkout-atlas
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apollo
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      # maturin develop requires an active virtualenv (or conda env) to
      # install into — there is none by default on the hosted runner.
      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Install Python test tools
        run: >-
          python -m pip install --upgrade
          pip==26.1.2 maturin==1.14.1 pytest==9.1.1 numpy==2.5.1
      - name: Build Python extension
        working-directory: apollo/crates/apollo-python
        run: maturin develop
      - name: Python smoke tests
        run: pytest crates/apollo-python/tests/test_smoke.py -q
