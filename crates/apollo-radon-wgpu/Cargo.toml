[package]
name = "apollo-radon-wgpu"
version = "0.2.0"
edition = "2021"
license = "MIT"
authors = ["Ryan Clanton PhD <ryanclanton@outlook.com>"]
repository = "https://github.com/ryancinsight/kwavers"
description = "WGPU backend boundary for Apollo Radon"

[dependencies]
apollo-fft = { path = "../apollo-fft" }
apollo-radon = { path = "../apollo-radon" }
apollo-wgpu-helpers = { path = "../apollo-wgpu-helpers" }
bytemuck = { version = "1.19", features = ["derive"] }
leto = { workspace = true }
ndarray = { workspace = true }
wgpu = { version = "26.0", features = ["wgsl"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "radon_wgpu_bench"
harness = false


[lints]
workspace = true
