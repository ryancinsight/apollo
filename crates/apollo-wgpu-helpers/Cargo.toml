[package]
name = "apollo-wgpu-helpers"
version = "0.3.0"
edition = "2021"
license = "MIT"
authors = ["Ryan Clanton PhD <ryanclanton@outlook.com>"]
repository.workspace = true
description = "Shared WGPU device acquisition and error contracts for the Apollo WGPU crate family"

[features]
default = ["parallel", "mnemosyne-memory"]
parallel = []
mnemosyne-memory = []

[dependencies]
hephaestus-wgpu = { workspace = true }
thiserror = { workspace = true }
wgpu = { workspace = true }
bytemuck = { workspace = true }

[lints]
workspace = true
