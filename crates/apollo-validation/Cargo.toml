[package]
name = "apollo-validation"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ryan Clanton PhD <ryanclanton@outlook.com>"]
repository = "https://github.com/ryancinsight/kwavers"
description = "Validation and benchmark surface for Apollo FFT"

[features]
default = ["external-references", "parallel", "mnemosyne-memory"]
external-references = ["dep:rustfft"]
parallel = [
    "apollo-fft/parallel",
    "apollo-nufft/parallel",
    "apollo-fft-wgpu/parallel",
    "apollo-nufft-wgpu/parallel",
    "apollo-dctdst/parallel",
    "apollo-dht/parallel",
    "apollo-ntt/parallel",
    "apollo-czt/parallel",
    "apollo-frft/parallel",
    "apollo-sdft/parallel",
    "apollo-wavelet/parallel",
    "apollo-fwht/parallel",
    "apollo-qft/parallel",
    "apollo-gft/parallel",
    "apollo-hilbert/parallel",
    "apollo-mellin/parallel",
    "apollo-radon/parallel",
    "apollo-sft/parallel",
    "apollo-sht/parallel",
    "apollo-stft/parallel",
]
mnemosyne-memory = [
    "apollo-fft/mnemosyne-memory",
    "apollo-nufft/mnemosyne-memory",
    "apollo-fft-wgpu/mnemosyne-memory",
    "apollo-nufft-wgpu/mnemosyne-memory",
    "apollo-dctdst/mnemosyne-memory",
    "apollo-dht/mnemosyne-memory",
    "apollo-ntt/mnemosyne-memory",
    "apollo-czt/mnemosyne-memory",
    "apollo-frft/mnemosyne-memory",
    "apollo-sdft/mnemosyne-memory",
    "apollo-wavelet/mnemosyne-memory",
    "apollo-fwht/mnemosyne-memory",
    "apollo-qft/mnemosyne-memory",
    "apollo-gft/mnemosyne-memory",
    "apollo-hilbert/mnemosyne-memory",
    "apollo-mellin/mnemosyne-memory",
    "apollo-radon/mnemosyne-memory",
    "apollo-sft/mnemosyne-memory",
    "apollo-sht/mnemosyne-memory",
    "apollo-stft/mnemosyne-memory",
]

[dependencies]
apollo-fft = { path = "../apollo-fft" }
apollo-nufft = { path = "../apollo-nufft" }
apollo-fft-wgpu = { path = "../apollo-fft-wgpu" }
apollo-nufft-wgpu = { path = "../apollo-nufft-wgpu" }
apollo-dctdst = { path = "../apollo-dctdst" }
apollo-dht = { path = "../apollo-dht" }
apollo-ntt = { path = "../apollo-ntt" }
apollo-czt = { path = "../apollo-czt" }
apollo-frft = { path = "../apollo-frft" }
apollo-sdft = { path = "../apollo-sdft" }
apollo-wavelet = { path = "../apollo-wavelet" }
apollo-fwht = { path = "../apollo-fwht" }
apollo-qft = { path = "../apollo-qft" }
apollo-gft = { path = "../apollo-gft" }
apollo-hilbert = { path = "../apollo-hilbert" }
apollo-mellin = { path = "../apollo-mellin" }
apollo-radon = { path = "../apollo-radon" }
apollo-sft = { path = "../apollo-sft" }
apollo-sht = { path = "../apollo-sht" }
apollo-stft = { path = "../apollo-stft" }
ndarray = { workspace = true }
num-complex = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
melinoe = { workspace = true }
moirai = { workspace = true }
leto = { workspace = true }

rustfft = { workspace = true, optional = true }

[lints]
workspace = true
